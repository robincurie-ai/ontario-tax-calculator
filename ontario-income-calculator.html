// Service Worker for offline

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState, useEffect} = React;

// ── Formatters ──────────────────────────────────────────────────────────────
const fmt = (n, dec=0) => {
  if (isNaN(n) || n === null || n === undefined) return '$0';
  const val = Math.round(n * Math.pow(10, dec)) / Math.pow(10, dec);
  return '$' + val.toLocaleString('en-CA', {minimumFractionDigits: dec, maximumFractionDigits: dec});
};
const pct = (n, dec=1) => {
  if (isNaN(n) || !isFinite(n)) return '0%';
  return (Math.round(n * 1000) / 10).toFixed(dec) + '%';
};

// ── 2024 Tax Calculations ────────────────────────────────────────────────────
function calcFederalTax(income) {
  const brackets = [[57375,0.15],[57375,0.205],[63895,0.26],[70390,0.29],[Infinity,0.33]];
  let tax = 0, rem = Math.max(0, income);
  for (const [b, r] of brackets) { const t = Math.min(rem, b); tax += t * r; rem -= t; if (rem <= 0) break; }
  return tax;
}
function calcProvincialTax(income) {
  const brackets = [[51446,0.0505],[51446,0.0915],[47107,0.1116],[70000,0.1216],[Infinity,0.1316]];
  let tax = 0, rem = Math.max(0, income);
  for (const [b, r] of brackets) { const t = Math.min(rem, b); tax += t * r; rem -= t; if (rem <= 0) break; }
  return tax;
}
function calcOntarioSurtax(provTax) {
  let surtax = 0;
  if (provTax > 5556) surtax += (provTax - 5556) * 0.20;
  if (provTax > 7108) surtax += (provTax - 7108) * 0.36;
  return surtax;
}
const FED_BASIC = 15705, ON_BASIC = 11865;

function calcTaxes(data) {
  const salary    = parseFloat(data.salary)      || 0;
  const ltd       = parseFloat(data.ltd)         || 0;
  const cppDis    = parseFloat(data.cppDisability)|| 0;
  const cppKids   = (parseFloat(data.cppKids)||0) * (parseInt(data.numKids)||0);
  const cycles    = parseInt(data.payCycles)     || 26;

  // LTD taxability: if employee paid premiums → non-taxable
  const taxableLTD   = data.selfPayLTD ? 0 : ltd;
  const taxableIncome = salary + taxableLTD;
  const totalIncome   = salary + ltd + cppDis + cppKids;

  const fedBasicCredit = FED_BASIC * 0.15;
  const onBasicCredit  = ON_BASIC  * 0.0505;

  const fedTax  = Math.max(0, calcFederalTax(taxableIncome) - fedBasicCredit);
  const provGross = calcProvincialTax(taxableIncome);
  const provBase  = Math.max(0, provGross - onBasicCredit);
  const provTax   = provBase + calcOntarioSurtax(provBase);

  // EI — only on employment income (CPP-D exempt)
  const ei  = Math.min(salary * 0.0166, 1049.12);
  // CPP — only on employment; CPP-D recipients are exempt from employee CPP on disability benefits
  const cpp = salary > 3500 ? Math.min((salary - 3500) * 0.0595, 3867.50) : 0;

  const totalTax  = fedTax + provTax + ei + cpp;
  const netAnnual = totalIncome - totalTax;

  return {
    totalIncome, taxableIncome, taxableLTD, cppKidsTotal: cppKids,
    fedTax, provTax, ei, cpp, totalTax, netAnnual,
    taxPerPay:     totalTax  / cycles,
    incomePerPay:  totalIncome / cycles,
    netPerPay:     netAnnual  / cycles,
    effectiveRate: taxableIncome > 0 ? totalTax / taxableIncome : 0,
    cppDisAmt: cppDis,
  };
}

function calcCapitalGains(p, baseIncome) {
  const acb       = parseFloat(p.acb)        || 0;
  const salePrice = parseFloat(p.salePrice)  || 0;
  const realtorFee= salePrice * ((parseFloat(p.realtorPct)||0) / 100);
  const legal     = parseFloat(p.legalFees)  || 0;
  const propTax   = parseFloat(p.propertyTax)|| 0;
  const totalCosts= realtorFee + legal + propTax;
  const capitalGain  = salePrice - acb - totalCosts;
  const taxableGain  = capitalGain * 0.5;          // 50% inclusion rate
  const inc = Math.max(0, baseIncome);
  const fedExtra  = Math.max(0, calcFederalTax(inc + Math.max(0,taxableGain))  - calcFederalTax(inc));
  const provExtra = Math.max(0, calcProvincialTax(inc + Math.max(0,taxableGain)) - calcProvincialTax(inc));
  const cgTax     = fedExtra + provExtra;
  const netCash   = salePrice - acb - totalCosts - cgTax;
  // RRSP needed = taxable portion (offsetting it brings taxable CG to zero)
  const rrspNeeded= Math.max(0, taxableGain);
  return {capitalGain, taxableGain, realtorFee, legal, propTax, totalCosts, cgTax, netCash, rrspNeeded, acb};
}

function calcRentalTax(rentalIncome, baseIncome) {
  const ri  = parseFloat(rentalIncome) || 0;
  const inc = Math.max(0, baseIncome);
  const fedExtra  = Math.max(0, calcFederalTax(inc + ri)  - calcFederalTax(inc));
  const provExtra = Math.max(0, calcProvincialTax(inc + ri) - calcProvincialTax(inc));
  const rentalTax = fedExtra + provExtra;
  return { rentalTax, netRental: ri - rentalTax };
}

const PROVINCES = [
  {code:'ON',name:'Ontario'},{code:'BC',name:'British Columbia'},{code:'AB',name:'Alberta'},
  {code:'QC',name:'Quebec'},{code:'MB',name:'Manitoba'},{code:'SK',name:'Saskatchewan'},
  {code:'NS',name:'Nova Scotia'},{code:'NB',name:'New Brunswick'},{code:'NL',name:'Newfoundland'},
  {code:'PE',name:'PEI'},
];

const DEFAULT = {
  salary:'', ltd:'', selfPayLTD:false, cppDisability:'', cppKids:'', numKids:0,
  payCycles:'26', properties:[], expenses:[],
};
const STORAGE_KEY = 'on_income_calc_v3';

// ── Toggle Component ────────────────────────────────────────────────────────
function Toggle({on, onClick}) {
  return <div className={`toggle${on?' on':''}`} onClick={onClick} />;
}

// ── INCOME TAB ──────────────────────────────────────────────────────────────
function IncomeTab({data, setData}) {
  const r = calcTaxes(data);
  const set = (k, v) => setData(d => ({...d, [k]: v}));

  return (
    <div>
      <div className="notice">
        Ontario 2024 estimates. CPP Disability and Children's Benefits are non-taxable at source.
        EI and CPP contributions apply to employment income only. LTD taxability depends on who paid the premiums.
      </div>

      <div className="summary-card">
        <div style={{fontSize:12,color:'#8b8fa8',marginBottom:4}}>Net Annual Income</div>
        <div className="big-num green">{fmt(r.netAnnual)}</div>
        <div className="grid2">
          <div className="stat-box"><div className="stat-label">Net Per Pay Period</div><div className="stat-value green">{fmt(r.netPerPay)}</div></div>
          <div className="stat-box"><div className="stat-label">Tax Per Pay Period</div><div className="stat-value red">{fmt(r.taxPerPay)}</div></div>
          <div className="stat-box"><div className="stat-label">Total Annual Tax</div><div className="stat-value red">{fmt(r.totalTax)}</div></div>
          <div className="stat-box"><div className="stat-label">Effective Rate</div><div className="stat-value amber">{pct(r.effectiveRate)}</div></div>
        </div>
      </div>

      <div className="section">
        <div className="section-title">Employment Income</div>
        <div className="field">
          <div className="label">Annual Salary / Wages</div>
          <div className="input-prefix"><input type="number" value={data.salary} onChange={e=>set('salary',e.target.value)} placeholder="0" inputMode="decimal"/></div>
        </div>
        <div className="field">
          <div className="label">Pay Frequency</div>
          <select value={data.payCycles} onChange={e=>set('payCycles',e.target.value)}>
            <option value="52">Weekly (52 pays/yr)</option>
            <option value="26">Bi-weekly (26 pays/yr)</option>
            <option value="24">Semi-monthly (24 pays/yr)</option>
            <option value="12">Monthly (12 pays/yr)</option>
          </select>
        </div>
      </div>

      <div className="section">
        <div className="section-title">LTD Benefits</div>
        <div className="field">
          <div className="label">Annual LTD Amount</div>
          <div className="input-prefix"><input type="number" value={data.ltd} onChange={e=>set('ltd',e.target.value)} placeholder="0" inputMode="decimal"/></div>
        </div>
        <div className="toggle-row">
          <div>
            <div style={{fontSize:13}}>Employee-paid premiums (LTD non-taxable)</div>
            <div style={{fontSize:11,color:'#8b8fa8',marginTop:2}}>Toggle ON if you paid the premiums yourself</div>
          </div>
          <Toggle on={data.selfPayLTD} onClick={()=>set('selfPayLTD',!data.selfPayLTD)}/>
        </div>
        {data.selfPayLTD && <div style={{fontSize:12,color:'#34d399',marginTop:8,padding:'8px',background:'#064e3b',borderRadius:8}}>✓ LTD excluded from taxable income (you paid premiums)</div>}
        {!data.selfPayLTD && <div style={{fontSize:12,color:'#fbbf24',marginTop:8,padding:'8px',background:'#451a03',borderRadius:8}}>Employer-paid LTD is taxable income</div>}
      </div>

      <div className="section">
        <div className="section-title">CPP Disability Benefits</div>
        <div className="field">
          <div className="label">CPP-D Annual Amount</div>
          <div className="input-prefix"><input type="number" value={data.cppDisability} onChange={e=>set('cppDisability',e.target.value)} placeholder="0" inputMode="decimal"/></div>
        </div>
        <div className="field">
          <div className="label">CPP Children's Benefit (per child / year)</div>
          <div className="input-prefix"><input type="number" value={data.cppKids} onChange={e=>set('cppKids',e.target.value)} placeholder="e.g. 3054" inputMode="decimal"/></div>
        </div>
        <div className="field">
          <div className="label">
            Number of Eligible Children
            <span>{parseInt(data.numKids)||0} × {fmt(parseFloat(data.cppKids)||0)} = {fmt((parseFloat(data.cppKids)||0)*(parseInt(data.numKids)||0))}</span>
          </div>
          <div className="counter-row">
            <button className="counter-btn" onClick={()=>set('numKids',Math.max(0,(parseInt(data.numKids)||0)-1))}>−</button>
            <input type="number" value={data.numKids} onChange={e=>set('numKids',Math.max(0,parseInt(e.target.value)||0))} inputMode="numeric"/>
            <button className="counter-btn" onClick={()=>set('numKids',(parseInt(data.numKids)||0)+1)}>+</button>
          </div>
        </div>
      </div>

      <div className="section">
        <div className="section-title">Full Tax Breakdown</div>
        <div className="info-row"><span className="lbl">Total Income (all sources)</span><span className="val b">{fmt(r.totalIncome)}</span></div>
        <div className="info-row"><span className="lbl">Taxable Income</span><span className="val">{fmt(r.taxableIncome)}</span></div>
        <div className="info-row"><span className="lbl">CPP-D (non-taxable)</span><span className="val g">{fmt(r.cppDisAmt)}</span></div>
        <div className="info-row"><span className="lbl">Children's Benefits (non-taxable)</span><span className="val g">{fmt(r.cppKidsTotal)}</span></div>
        <div className="divider"/>
        <div className="info-row"><span className="lbl">Federal Income Tax</span><span className="val r">{fmt(r.fedTax)}</span></div>
        <div className="info-row"><span className="lbl">Ontario Provincial Tax</span><span className="val r">{fmt(r.provTax)}</span></div>
        <div className="info-row"><span className="lbl">EI Premiums</span><span className="val r">{fmt(r.ei)}</span></div>
        <div className="info-row"><span className="lbl">CPP Contributions</span><span className="val r">{fmt(r.cpp)}</span></div>
        <div className="divider"/>
        <div className="info-row"><span className="lbl" style={{fontWeight:600,fontSize:14}}>Total Tax Owed (Year)</span><span className="val r" style={{fontWeight:700,fontSize:14}}>{fmt(r.totalTax)}</span></div>
        <div className="info-row"><span className="lbl" style={{fontWeight:600,fontSize:14}}>Tax to Withhold Per Pay</span><span className="val r" style={{fontWeight:700,fontSize:14}}>{fmt(r.taxPerPay)}</span></div>
        <div className="divider"/>
        <div className="info-row"><span className="lbl" style={{fontWeight:700,fontSize:14}}>Net Annual Take-Home</span><span className="val g" style={{fontWeight:700,fontSize:15}}>{fmt(r.netAnnual)}</span></div>
        <div className="info-row"><span className="lbl" style={{fontWeight:700}}>Net Per Pay Period</span><span className="val g" style={{fontWeight:700}}>{fmt(r.netPerPay)}</span></div>
      </div>
    </div>
  );
}

// ── PROPERTY TAB ────────────────────────────────────────────────────────────
function PropertyTab({data, setData}) {
  const [editing, setEditing] = useState(null);
  const incTax = calcTaxes(data);
  const baseIncome = incTax.taxableIncome;

  const addProp = () => {
    const p = {id:Date.now(),name:'New Property',acb:'',salePrice:'',realtorPct:'5',legalFees:'2000',propertyTax:'',rentalIncome:'',province:'ON',enabled:true,mode:'sale'};
    setData(d => ({...d, properties:[...d.properties, p]}));
    setEditing(p.id);
  };
  const upd = (id, k, v) => setData(d => ({...d, properties:d.properties.map(p => p.id===id?{...p,[k]:v}:p)}));
  const del = (id) => { setData(d => ({...d, properties:d.properties.filter(p=>p.id!==id)})); if(editing===id) setEditing(null); };

  const enabled = data.properties.filter(p=>p.enabled);
  let totalSaleNet=0, totalCGTax=0, totalRentalNet=0;
  enabled.forEach(p => {
    const sp = parseFloat(p.salePrice)||0;
    if (p.mode==='sale' && sp>0) { const r=calcCapitalGains(p,baseIncome); totalSaleNet+=r.netCash; totalCGTax+=r.cgTax; }
    if (p.mode==='rental') { const r=calcRentalTax(p.rentalIncome,baseIncome); totalRentalNet+=r.netRental; }
  });

  return (
    <div>
      <div className="summary-card">
        <div style={{fontSize:12,color:'#8b8fa8',marginBottom:8}}>Active Properties: {enabled.length} of {data.properties.length}</div>
        <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
          <div><div style={{fontSize:11,color:'#8b8fa8'}}>Net Sale Proceeds</div><div style={{fontSize:22,fontWeight:700,color:totalSaleNet>=0?'#34d399':'#f87171'}}>{fmt(totalSaleNet)}</div></div>
          <div><div style={{fontSize:11,color:'#8b8fa8'}}>Capital Gains Tax</div><div style={{fontSize:22,fontWeight:700,color:'#f87171'}}>{fmt(totalCGTax)}</div></div>
        </div>
        {totalRentalNet > 0 && <div style={{marginTop:10}}><div style={{fontSize:11,color:'#8b8fa8'}}>Annual Rental Net</div><div style={{fontSize:22,fontWeight:700,color:'#4f8ef7'}}>{fmt(totalRentalNet)}</div></div>}
      </div>

      <button className="btn btn-primary" onClick={addProp}>+ Add Property</button>

      {data.properties.length === 0 && <div className="empty-state">No properties added yet.<br/>Tap above to add one.</div>}

      {data.properties.map(p => {
        const sp  = parseFloat(p.salePrice)||0;
        const cg  = (p.mode==='sale' && sp>0) ? calcCapitalGains(p, baseIncome) : null;
        const rr  = (p.mode==='rental')        ? calcRentalTax(p.rentalIncome, baseIncome) : null;
        const isOpen = editing === p.id;

        return (
          <div key={p.id} className="accordion">
            <div className="acc-header" onClick={()=>setEditing(isOpen?null:p.id)}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name||'Unnamed Property'}</div>
                <div style={{fontSize:11,color:'#8b8fa8',marginTop:2}}>
                  {p.mode==='sale' ? `Sale: ${fmt(sp)} · Net: ${cg?fmt(cg.netCash):'—'}` : `Rental: ${fmt(parseFloat(p.rentalIncome)||0)}/yr`}
                </div>
              </div>
              <div style={{display:'flex',gap:10,alignItems:'center',flexShrink:0}}>
                <Toggle on={p.enabled} onClick={e=>{e.stopPropagation();upd(p.id,'enabled',!p.enabled);}}/>
                <span style={{color:'#8b8fa8',fontSize:14}}>{isOpen?'▲':'▼'}</span>
              </div>
            </div>

            {isOpen && (
              <div className="acc-body">
                <div className="tab-bar">
                  <button className={`tab${p.mode==='sale'?' active':''}`} onClick={()=>upd(p.id,'mode','sale')}>Sale Analysis</button>
                  <button className={`tab${p.mode==='rental'?' active':''}`} onClick={()=>upd(p.id,'mode','rental')}>Rental Income</button>
                </div>

                <div className="field"><div className="label">Property Name</div><input type="text" value={p.name} onChange={e=>upd(p.id,'name',e.target.value)}/></div>
                <div className="field"><div className="label">Province of Sale / Location</div>
                  <select value={p.province} onChange={e=>upd(p.id,'province',e.target.value)}>
                    {PROVINCES.map(pr=><option key={pr.code} value={pr.code}>{pr.name}</option>)}
                  </select>
                </div>
                <div className="field"><div className="label">ACB — Adjusted Cost Base</div><div className="input-prefix"><input type="number" value={p.acb} onChange={e=>upd(p.id,'acb',e.target.value)} placeholder="0" inputMode="decimal"/></div></div>

                {p.mode==='sale' && <>
                  <div className="field"><div className="label">Sale Price</div><div className="input-prefix"><input type="number" value={p.salePrice} onChange={e=>upd(p.id,'salePrice',e.target.value)} placeholder="0" inputMode="decimal"/></div></div>
                  <div className="field"><div className="label">Realtor Commission (%)</div><input type="number" value={p.realtorPct} onChange={e=>upd(p.id,'realtorPct',e.target.value)} placeholder="5" inputMode="decimal"/></div>
                  <div className="field"><div className="label">Legal Fees</div><div className="input-prefix"><input type="number" value={p.legalFees} onChange={e=>upd(p.id,'legalFees',e.target.value)} placeholder="2000" inputMode="decimal"/></div></div>
                  <div className="field"><div className="label">Property Tax (outstanding at sale)</div><div className="input-prefix"><input type="number" value={p.propertyTax} onChange={e=>upd(p.id,'propertyTax',e.target.value)} placeholder="0" inputMode="decimal"/></div></div>

                  {cg && <>
                    <div className="divider"/>
                    <div style={{fontSize:12,fontWeight:600,color:'#8b8fa8',marginBottom:8,letterSpacing:'0.8px'}}>SALE ANALYSIS</div>
                    <div className="info-row"><span className="lbl">Sale Price</span><span className="val b">{fmt(sp)}</span></div>
                    <div className="info-row"><span className="lbl">ACB</span><span className="val">{fmt(cg.acb)}</span></div>
                    <div className="info-row"><span className="lbl">Realtor Fees ({p.realtorPct}%)</span><span className="val r">−{fmt(cg.realtorFee)}</span></div>
                    <div className="info-row"><span className="lbl">Legal Fees</span><span className="val r">−{fmt(cg.legal)}</span></div>
                    {cg.propTax>0&&<div className="info-row"><span className="lbl">Property Tax</span><span className="val r">−{fmt(cg.propTax)}</span></div>}
                    <div className="divider"/>
                    <div className="info-row"><span className="lbl">Capital Gain</span><span className={`val ${cg.capitalGain>=0?'g':'r'}`}>{fmt(cg.capitalGain)}</span></div>
                    <div className="info-row"><span className="lbl">Taxable Gain (50% inclusion)</span><span className="val a">{fmt(cg.taxableGain)}</span></div>
                    <div className="info-row"><span className="lbl">Capital Gains Tax</span><span className="val r">{fmt(cg.cgTax)}</span></div>
                    <div className="divider"/>
                    <div className="info-row"><span className="lbl" style={{fontWeight:700,fontSize:14}}>Net Cash After All Costs</span><span className={`val ${cg.netCash>=0?'g':'r'}`} style={{fontWeight:700,fontSize:14}}>{fmt(cg.netCash)}</span></div>
                    <div className="rrsp-box" style={{marginTop:12}}>
                      <div style={{fontSize:11,color:'#93c5fd',marginBottom:4,fontWeight:600,letterSpacing:'0.6px'}}>RRSP STRATEGY TO ELIMINATE CAPITAL GAINS TAX</div>
                      <div style={{fontSize:13,color:'#e8eaf0',lineHeight:1.6}}>
                        Contribute <span style={{color:'#4f8ef7',fontWeight:700,fontSize:15}}>{fmt(cg.rrspNeeded)}</span> to your RRSP to offset the taxable portion of your capital gain and potentially reduce capital gains tax to <span style={{color:'#34d399',fontWeight:700}}>$0</span>.
                      </div>
                    </div>
                  </>}
                </>}

                {p.mode==='rental' && <>
                  <div className="field"><div className="label">Annual Gross Rental Income</div><div className="input-prefix"><input type="number" value={p.rentalIncome} onChange={e=>upd(p.id,'rentalIncome',e.target.value)} placeholder="0" inputMode="decimal"/></div></div>
                  {rr && parseFloat(p.rentalIncome)>0 && <>
                    <div className="divider"/>
                    <div style={{fontSize:12,fontWeight:600,color:'#8b8fa8',marginBottom:8,letterSpacing:'0.8px'}}>RENTAL TAX ANALYSIS</div>
                    <div className="info-row"><span className="lbl">Gross Rental Income</span><span className="val b">{fmt(parseFloat(p.rentalIncome))}</span></div>
                    <div className="info-row"><span className="lbl">Marginal Tax on Rental</span><span className="val r">−{fmt(rr.rentalTax)}</span></div>
                    <div className="divider"/>
                    <div className="info-row"><span className="lbl" style={{fontWeight:700,fontSize:14}}>Net Rental Income</span><span className="val g" style={{fontWeight:700,fontSize:14}}>{fmt(rr.netRental)}</span></div>
                  </>}
                </>}

                <button className="btn btn-danger" style={{marginTop:16}} onClick={()=>del(p.id)}>Delete This Property</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── EXPENSES TAB ────────────────────────────────────────────────────────────
function ExpensesTab({data, setData}) {
  const [name, setName]   = useState('');
  const [amt,  setAmt]    = useState('');
  const [freq, setFreq]   = useState('monthly');

  const incTax     = calcTaxes(data);
  const netMonthly = incTax.netAnnual / 12;

  const addExp = () => {
    if (!name.trim() || !amt) return;
    const a = parseFloat(amt) || 0;
    const annualAmt = freq==='monthly' ? a*12 : freq==='weekly' ? a*52 : freq==='biweekly' ? a*26 : a;
    setData(d => ({...d, expenses:[...d.expenses, {id:Date.now(),name:name.trim(),amount:annualAmt,freq,enabled:true}]}));
    setName(''); setAmt('');
  };
  const toggleExp = id => setData(d => ({...d, expenses:d.expenses.map(e=>e.id===id?{...e,enabled:!e.enabled}:e)}));
  const delExp    = id => setData(d => ({...d, expenses:d.expenses.filter(e=>e.id!==id)}));

  const active        = data.expenses.filter(e=>e.enabled);
  const totalAnnual   = active.reduce((s,e)=>s+e.amount, 0);
  const totalMonthly  = totalAnnual / 12;
  const netAfterExp   = incTax.netAnnual - totalAnnual;
  const monthlyAfter  = netAfterExp / 12;

  return (
    <div>
      <div className="summary-card">
        <div style={{fontSize:12,color:'#8b8fa8',marginBottom:4}}>Monthly Net Cash Flow</div>
        <div className="big-num" style={{color:monthlyAfter>=0?'#34d399':'#f87171'}}>{fmt(monthlyAfter)}</div>
        <div className="grid2">
          <div className="stat-box"><div className="stat-label">Monthly Income (net)</div><div className="stat-value green">{fmt(netMonthly)}</div></div>
          <div className="stat-box"><div className="stat-label">Monthly Expenses</div><div className="stat-value red">{fmt(totalMonthly)}</div></div>
          <div className="stat-box"><div className="stat-label">Annual Surplus / Deficit</div><div className="stat-value" style={{color:netAfterExp>=0?'#34d399':'#f87171'}}>{fmt(netAfterExp)}</div></div>
          <div className="stat-box"><div className="stat-label">Expense Ratio</div><div className="stat-value amber">{pct(netMonthly>0?totalMonthly/netMonthly:0)}</div></div>
        </div>
      </div>

      <div className="section">
        <div className="section-title">Add Expense</div>
        <div className="field"><div className="label">Expense Name</div><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Mortgage, Groceries, Car"/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div className="field"><div className="label">Amount</div><div className="input-prefix"><input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0" inputMode="decimal"/></div></div>
          <div className="field"><div className="label">Frequency</div>
            <select value={freq} onChange={e=>setFreq(e.target.value)}>
              <option value="monthly">Monthly</option>
              <option value="weekly">Weekly</option>
              <option value="biweekly">Bi-weekly</option>
              <option value="annual">Annual</option>
            </select>
          </div>
        </div>
        <button className="btn btn-primary" onClick={addExp}>Add Expense</button>
      </div>

      {data.expenses.length === 0 && <div className="empty-state">No expenses added yet.<br/>Add your monthly bills above.</div>}

      {data.expenses.length > 0 && (
        <div className="section">
          <div className="section-title">Your Expenses</div>
          {data.expenses.map(e => (
            <div key={e.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid #2a2d3e'}}>
              <Toggle on={e.enabled} onClick={()=>toggleExp(e.id)}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500,color:e.enabled?'#e8eaf0':'#6b7280'}}>{e.name}</div>
                <div style={{fontSize:11,color:'#8b8fa8'}}>{fmt(e.amount/12)}/mo · {fmt(e.amount)}/yr</div>
              </div>
              <button onClick={()=>delExp(e.id)} style={{background:'none',border:'none',color:'#f87171',cursor:'pointer',fontSize:20,lineHeight:1,padding:'4px'}}>×</button>
            </div>
          ))}
          <div className="divider"/>
          <div className="info-row"><span className="lbl">Total Monthly Expenses</span><span className="val r">{fmt(totalMonthly)}</span></div>
          <div className="info-row"><span className="lbl">Total Annual Expenses</span><span className="val r">{fmt(totalAnnual)}</span></div>
          <div className="info-row" style={{marginTop:4}}><span className="lbl" style={{fontWeight:700}}>Annual Net After Expenses</span><span className="val" style={{fontWeight:700,color:netAfterExp>=0?'#34d399':'#f87171'}}>{fmt(netAfterExp)}</span></div>
        </div>
      )}
    </div>
  );
}

// ── SUMMARY TAB ─────────────────────────────────────────────────────────────
function SummaryTab({data}) {
  const incTax = calcTaxes(data);
  const enabled = data.properties.filter(p=>p.enabled);
  const active  = data.expenses.filter(e=>e.enabled);
  const totalExpenses = active.reduce((s,e)=>s+e.amount, 0);

  let totalSaleNet=0, totalRentalNet=0, totalCGTax=0;
  enabled.forEach(p => {
    const sp = parseFloat(p.salePrice)||0;
    if (p.mode==='sale' && sp>0) { const r=calcCapitalGains(p,incTax.taxableIncome); totalSaleNet+=r.netCash; totalCGTax+=r.cgTax; }
    if (p.mode==='rental') { const r=calcRentalTax(p.rentalIncome,incTax.taxableIncome); totalRentalNet+=r.netRental; }
  });

  const grandAnnual  = incTax.netAnnual + totalRentalNet - totalExpenses;
  const grandMonthly = grandAnnual / 12;

  return (
    <div>
      <div className="summary-card">
        <div style={{fontSize:12,color:'#8b8fa8',marginBottom:4}}>Total Annual Net (Income + Rental − Expenses)</div>
        <div className="big-num" style={{color:grandAnnual>=0?'#34d399':'#f87171'}}>{fmt(grandAnnual)}</div>
        <div className="stat-box" style={{marginTop:12}}>
          <div className="stat-label">Monthly Net Cash Flow</div>
          <div className="stat-value" style={{fontSize:22,color:grandMonthly>=0?'#34d399':'#f87171'}}>{fmt(grandMonthly)}</div>
        </div>
      </div>

      <div className="section">
        <div className="section-title">Income Sources</div>
        <div className="info-row"><span className="lbl">Employment / Salary</span><span className="val b">{fmt(parseFloat(data.salary)||0)}</span></div>
        <div className="info-row"><span className="lbl">LTD Benefits</span><span className="val b">{fmt(parseFloat(data.ltd)||0)}</span></div>
        <div className="info-row"><span className="lbl">CPP Disability</span><span className="val b">{fmt(incTax.cppDisAmt)}</span></div>
        <div className="info-row"><span className="lbl">CPP Children's Benefits</span><span className="val b">{fmt(incTax.cppKidsTotal)}</span></div>
        {totalRentalNet>0&&<div className="info-row"><span className="lbl">Net Rental Income</span><span className="val b">{fmt(totalRentalNet)}</span></div>}
        <div className="divider"/>
        <div className="info-row"><span className="lbl" style={{fontWeight:700}}>Gross Total</span><span className="val b" style={{fontWeight:700}}>{fmt(incTax.totalIncome + totalRentalNet)}</span></div>
      </div>

      <div className="section">
        <div className="section-title">All Taxes &amp; Deductions</div>
        <div className="info-row"><span className="lbl">Federal Income Tax</span><span className="val r">{fmt(incTax.fedTax)}</span></div>
        <div className="info-row"><span className="lbl">Ontario Provincial Tax</span><span className="val r">{fmt(incTax.provTax)}</span></div>
        <div className="info-row"><span className="lbl">EI Premiums</span><span className="val r">{fmt(incTax.ei)}</span></div>
        <div className="info-row"><span className="lbl">CPP Contributions</span><span className="val r">{fmt(incTax.cpp)}</span></div>
        {totalCGTax>0&&<div className="info-row"><span className="lbl">Capital Gains Tax</span><span className="val r">{fmt(totalCGTax)}</span></div>}
        <div className="divider"/>
        <div className="info-row"><span className="lbl" style={{fontWeight:700}}>Total Annual Tax Owed</span><span className="val r" style={{fontWeight:700,fontSize:14}}>{fmt(incTax.totalTax + totalCGTax)}</span></div>
        <div className="info-row"><span className="lbl">Tax to Withhold Per Pay ({data.payCycles} periods)</span><span className="val r" style={{fontWeight:600}}>{fmt(incTax.taxPerPay)}</span></div>
        <div className="info-row"><span className="lbl">Effective Tax Rate</span><span className="val a">{pct(incTax.effectiveRate)}</span></div>
      </div>

      {enabled.length > 0 && (
        <div className="section">
          <div className="section-title">Property Summary</div>
          {enabled.map(p => {
            const sp = parseFloat(p.salePrice)||0;
            const cg = (p.mode==='sale'&&sp>0)?calcCapitalGains(p,incTax.taxableIncome):null;
            const rr = (p.mode==='rental')?calcRentalTax(p.rentalIncome,incTax.taxableIncome):null;
            return (
              <div key={p.id} style={{marginBottom:8}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4,color:'#93c5fd'}}>{p.name}</div>
                {cg&&<><div className="info-row"><span className="lbl">Capital Gain</span><span className={`val ${cg.capitalGain>=0?'g':'r'}`}>{fmt(cg.capitalGain)}</span></div><div className="info-row"><span className="lbl">Net After All Costs</span><span className={`val ${cg.netCash>=0?'g':'r'}`}>{fmt(cg.netCash)}</span></div><div className="info-row"><span className="lbl">RRSP to Eliminate CG Tax</span><span className="val a">{fmt(cg.rrspNeeded)}</span></div></>}
                {rr&&parseFloat(p.rentalIncome)>0&&<><div className="info-row"><span className="lbl">Net Rental</span><span className="val g">{fmt(rr.netRental)}</span></div></>}
                <div className="divider"/>
              </div>
            );
          })}
        </div>
      )}

      <div className="section">
        <div className="section-title">Expenses Summary</div>
        <div className="info-row"><span className="lbl">Total Annual Expenses</span><span className="val r">{fmt(totalExpenses)}</span></div>
        <div className="info-row"><span className="lbl">Total Monthly Expenses</span><span className="val r">{fmt(totalExpenses/12)}</span></div>
      </div>

      <div className="section">
        <div className="section-title">Final Net Position</div>
        <div className="info-row"><span className="lbl">Net Employment Income</span><span className="val g">{fmt(incTax.netAnnual)}</span></div>
        {totalRentalNet>0&&<div className="info-row"><span className="lbl">Net Rental Income</span><span className="val g">{fmt(totalRentalNet)}</span></div>}
        <div className="info-row"><span className="lbl">Less: Annual Expenses</span><span className="val r">−{fmt(totalExpenses)}</span></div>
        <div className="divider"/>
        <div className="info-row"><span className="lbl" style={{fontWeight:700,fontSize:15}}>Annual Net Cash</span><span className="val" style={{fontWeight:700,fontSize:15,color:grandAnnual>=0?'#34d399':'#f87171'}}>{fmt(grandAnnual)}</span></div>
        <div className="info-row"><span className="lbl" style={{fontWeight:700,fontSize:15}}>Monthly Net Cash</span><span className="val" style={{fontWeight:700,fontSize:15,color:grandMonthly>=0?'#34d399':'#f87171'}}>{fmt(grandMonthly)}</span></div>
        {totalSaleNet!==0&&<div className="info-row" style={{marginTop:4}}><span className="lbl" style={{fontWeight:600}}>+ Property Sale Proceeds</span><span className={`val ${totalSaleNet>=0?'g':'r'}`} style={{fontWeight:600}}>{fmt(totalSaleNet)}</span></div>}
      </div>

      <div style={{height:16}}/>
    </div>
  );
}

// ── APP ROOT ────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('income');
  const [data, setData] = useState(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : DEFAULT; }
    catch { return DEFAULT; }
  });

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  }, [data]);

  const tabs = [
    { id:'income',   label:'Income',
      icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> },
    { id:'property', label:'Property',
      icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
    { id:'expenses', label:'Expenses',
      icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> },
    { id:'summary',  label:'Summary',
      icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> },
  ];

  return (
    <div className="app">
      <div className="header">
        <div className="logo">$</div>
        <div>
          <h1>Ontario Income Calculator</h1>
          <p>2024 Tax Year · Data saved locally on device</p>
        </div>
      </div>

      <div className="content">
        {tab==='income'   && <IncomeTab   data={data} setData={setData}/>}
        {tab==='property' && <PropertyTab data={data} setData={setData}/>}
        {tab==='expenses' && <ExpensesTab data={data} setData={setData}/>}
        {tab==='summary'  && <SummaryTab  data={data}/>}
      </div>

      <div className="nav">
        {tabs.map(t => (
          <button key={t.id} className={`nav-btn${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
            {t.icon}{t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
